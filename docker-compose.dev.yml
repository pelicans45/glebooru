services:
    server:
        build: server
        #platform: linux/arm64
        restart: unless-stopped
        cap_add:
            - SYS_PTRACE
        security_opt:
            - seccomp=unconfined
        depends_on:
            - sql
        environment:
            ## These should be the names of the dependent containers listed below,
            ## or FQDNs/IP addresses if these services are running outside of Docker
            POSTGRES_HOST: sql
            ## Credentials for database:
            POSTGRES_USER:
            POSTGRES_PASSWORD:
            ## Commented Values are Default:
            #POSTGRES_DB: defaults to same as POSTGRES_USER
            #POSTGRES_PORT: 5432
            #LOG_SQL: 0 (1 for verbose SQL logs)
            THREADS:
            WORKERS:
            ## HTTP Server: granian (Rust-based, high performance)
            SECRET: jK7svgsiHlpi8ZZ5Ggrzsi8mbsWkG987
        volumes:
            - "server_data:/data"
            - "./client/config.dev.yaml:/opt/app/config.yaml:ro"
            - "./client/sites.dev.yaml:/opt/app/sites.yaml:ro"
            - "./client/html/index.html:/opt/app/index.html:ro"

    client:
        build:
            context: client
            target: development
            args:
                DEV: 1
        #platform: linux/arm64
        restart: unless-stopped
        depends_on:
            - server
        environment:
            BACKEND_HOST: server
            BASE_URL:
            GLEBOORU_DEV: 1
            GLEBOORU_WATCH: ${GLEBOORU_WATCH}
            GLEBOORU_WATCH_POLL: ${GLEBOORU_WATCH_POLL}
        volumes:
            - "server_data:/data:ro"
            - "./client:/opt/app"
        ports:
            - "8888:80"
        expose:
            - "80"

    sql:
        image: postgres:18.1
        restart: unless-stopped
        environment:
            POSTGRES_USER:
            POSTGRES_PASSWORD:
        volumes:
            # PostgreSQL 18 changed PGDATA to /var/lib/postgresql/18/docker
            # Mount at /var/lib/postgresql for pg_upgrade compatibility
            - "db:/var/lib/postgresql"
            - "./server/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro"
            # - "/opt/backup:/opt/backup"  # Only needed for backups
        command: postgres -c config_file=/etc/postgresql/postgresql.conf

    nginx:
        image: nginx:1.27.0
        depends_on:
            - client
        restart: unless-stopped
        entrypoint: ["nginx", "-g", "daemon off;"]
        environment:
            NGINX_ENTRYPOINT_QUIET_LOGS: "1"
        volumes:
            - "./server/nginx/etc:/etc/nginx:ro"
        ports:
            - "4000:4000"

volumes:
    server_data:
    client_data:
    db:
