worker_processes auto;
#user nginx;

error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '[$host] $remote_addr -> $request_method $request_uri [$status] - "$http_referer"';
    access_log /dev/stdout main;

    server_tokens off;
    keepalive_timeout 65;

    real_ip_header X-Real-IP;

    proxy_cache_path /tmp/nginx-cache
                     levels=1:2
                     keys_zone=spa_cache:8m
                     max_size=50m
                     inactive=60m
                     use_temp_path=off;


    # Use Docker's embedded DNS resolver for runtime resolution
    # This fixes DNS timing issues when server container isn't ready at startup
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    server {
        listen 80 default_server;

        # Backend variable for dynamic DNS resolution (resolved at request time, not startup)
        set $backend_upstream http://__BACKEND__:6666;

        location ~ ^/api$ {
            return 302 /api/;
        }

        location ~ ^/api/(.*)$ {
            add_header 'Access-Control-Allow-Origin' '*';
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Methods'
                    'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers'
                    'Authorization, Content-Type';
                return 200;
            }

            client_max_body_size 1073741824;

            gzip on;
            gzip_comp_level 3;
            gzip_min_length 20;
            gzip_proxied expired no-cache no-store private auth;
            gzip_types text/plain application/json;

            if ($request_uri ~* "/api/(.*)") {
                proxy_pass $backend_upstream/$1;
            }

            error_page 500 502 503 504 @badproxy;
        }

        location = /favicon.ico {
            add_header 'Cache-Control' 'public, max-age=2592000, immutable';
            alias /var/www/$host/img/favicon.png;
        }

        location /data/ {
            rewrite ^/data/(.*) /$1 break;
            root /data;

            error_page 403 @unauthorized;
            error_page 404 @notfound;
        }

        location ~ ^/posts/.*?([0-9]+\.[a-z0-9]+$) {
            add_header 'Cache-Control' 'public, max-age=2592000, immutable';
            add_header 'Access-Control-Allow-Origin' '*' always;
            root /data/posts;
            try_files /$1 =404;

            error_page 403 @unauthorized;
            error_page 404 @notfound;
        }

        location ~ ^/thumbnails/.*?([0-9]+\.[a-z0-9]+$) {
            add_header 'Cache-Control' 'public, max-age=2592000, immutable';
            add_header 'Access-Control-Allow-Origin' '*' always;
            root /data/generated-thumbnails;
            try_files /$1 =404;

            error_page 403 @unauthorized;
            error_page 404 @notfound;
        }

        location ~ ^/(js|css|img|fonts)/.*$ {
            add_header 'Cache-Control' 'public, max-age=2592000, immutable';
            root /var/www/$host;
            try_files $uri /index.html;

            #gzip_static on;
            #gzip_proxied expired no-cache no-store private auth;
            gzip on;
            gzip_proxied any;
            gzip_comp_level 2;
            gzip_min_length 50;
            gzip_types text/plain text/css application/json application/javascript application/x-javascript text/javascript application/octet-stream;

            error_page 404 @notfound;
        }

        location = /robots.txt {
            root /var/www/$host;
            try_files /robots.txt =404;
        }

        location = /sitemap.xml {
            proxy_pass $backend_upstream/sitemap.xml;
            proxy_set_header Host $host;
        }

        location / {
            root /var/www/$host;
            try_files $uri /index.html;

            # remove unneeded auth headers to improve caching
            proxy_set_header Authorization "";

            #proxy_cache spa_cache;
            #proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            #proxy_cache_background_update on;
            #proxy_cache_lock on;
            #proxy_cache_lock_age 2s;
            #proxy_cache_lock_timeout 2s;

            #proxy_cache_valid 200 302 30s;

            gzip on;
            gzip_comp_level 3;
            gzip_min_length 20;
            gzip_proxied any;
            gzip_types text/plain application/json;

            if ($http_accept ~ "application/json") {
                return 406 "API requests should be sent to the /api prefix";
            }

            #if ($request_uri ~* "/(.*)") {
            #    proxy_pass http://backend/html/$1;
            #}

            error_page 500 502 503 504 @badproxy;
        }

        #location / {
        #    gzip_static on;
        #    gzip_proxied expired no-cache no-store private auth;
        #}

        location @unauthorized {
            return 403 "unauthorized";
            default_type text/plain;
        }

        location @notfound {
            return 404 "not found";
            default_type text/plain;
        }

        location @badproxy {
            return 502 "API connection failed";
            default_type text/plain;
        }
    }
}
