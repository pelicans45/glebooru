# PostgreSQL 18 Configuration - io_uring Mode
# ============================================
# This is an alternate configuration using io_uring for benchmarking.
# io_uring is typically faster for local NVMe/SSD storage but may be
# slower for network-attached storage.
#
# Copy this file to postgresql.conf to test io_uring mode.

# Include all base settings
# (This file only overrides the io_method setting)

#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------
max_connections = 50
authentication_timeout = 60s

#------------------------------------------------------------------------------
# MEMORY CONFIGURATION
#------------------------------------------------------------------------------
shared_buffers = 384MB
work_mem = 16MB
maintenance_work_mem = 128MB
wal_buffers = 16MB
effective_cache_size = 1536MB

#------------------------------------------------------------------------------
# POSTGRESQL 18 ASYNCHRONOUS I/O - IO_URING MODE
#------------------------------------------------------------------------------

# Use io_uring for maximum I/O performance
# Requires: Linux kernel >= 5.1, Postgres built with --with-liburing
io_method = io_uring

# Parallel workers
max_parallel_workers_per_gather = 2
max_parallel_workers = 2
parallel_tuple_cost = 0.01
parallel_setup_cost = 100

#------------------------------------------------------------------------------
# WRITE AHEAD LOG (WAL)
#------------------------------------------------------------------------------
wal_level = replica
fsync = on
synchronous_commit = on
checkpoint_timeout = 10min
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 256MB

#------------------------------------------------------------------------------
# QUERY PLANNER
#------------------------------------------------------------------------------
random_page_cost = 1.1
seq_page_cost = 1.0
effective_io_concurrency = 200
default_statistics_target = 100

#------------------------------------------------------------------------------
# AUTOVACUUM
#------------------------------------------------------------------------------
autovacuum = on
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_limit = 1000
autovacuum_max_workers = 2

#------------------------------------------------------------------------------
# LOGGING
#------------------------------------------------------------------------------
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_timezone = 'UTC'

#------------------------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
#------------------------------------------------------------------------------
timezone = 'UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'

#------------------------------------------------------------------------------
# JIT
#------------------------------------------------------------------------------
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000
