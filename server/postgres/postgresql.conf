# PostgreSQL 18 Optimized Configuration
# ======================================
# Optimized for: 2 CPU cores, 2GB RAM, SSD storage (DigitalOcean Droplet)
#
# This configuration is tuned for a small-to-medium booru application
# with mixed read/write workload.

#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------

# Listen on all interfaces (required for Docker networking)
listen_addresses = '*'

# Maximum number of connections
# With 2GB RAM and WSGI threads, we don't need many connections
max_connections = 50

# Connection timeout
authentication_timeout = 60s

#------------------------------------------------------------------------------
# MEMORY CONFIGURATION
#------------------------------------------------------------------------------

# Shared memory for caching data
# Rule: ~25% of RAM for dedicated DB servers, less for shared
# 2GB RAM -> ~400MB shared_buffers
shared_buffers = 384MB

# Memory for complex queries (sorts, hashes, etc.)
# Per-connection, so keep conservative with 50 max_connections
work_mem = 16MB

# Memory for maintenance operations (VACUUM, CREATE INDEX)
# Can be higher since these run infrequently
maintenance_work_mem = 128MB

# Memory for WAL buffers
wal_buffers = 16MB

# Effective cache size (OS cache estimate)
# ~75% of total RAM
effective_cache_size = 1536MB

#------------------------------------------------------------------------------
# POSTGRESQL 18 ASYNCHRONOUS I/O (AIO) CONFIGURATION
#------------------------------------------------------------------------------

# io_method: sync, worker, or io_uring
# - sync: Traditional synchronous I/O (PostgreSQL 17 behavior)
# - worker: Background I/O workers (default in PG18)
# - io_uring: Linux kernel io_uring (can be faster for some workloads)
#
# 'worker' is the default and recommended starting point.
# io_uring may be faster for cold cache reads but worker provides
# better parallelism for index scans and mixed workloads.
#
# IMPORTANT: Test both modes with the benchmark script!
io_method = worker

# Number of I/O workers (only applies when io_method = worker)
# Rule: 1-2 per CPU core
io_workers = 4

# Maximum concurrent I/O operations
# Higher values benefit sequential scans on fast storage
max_parallel_workers_per_gather = 2

# Total parallel workers available
max_parallel_workers = 2

# Enable parallel query for sequential scans
parallel_tuple_cost = 0.01
parallel_setup_cost = 100

#------------------------------------------------------------------------------
# WRITE AHEAD LOG (WAL)
#------------------------------------------------------------------------------

# WAL level for replication
wal_level = replica

# Fsync for data integrity (never disable in production!)
fsync = on

# Synchronous commit for durability
# 'off' is faster but risks data loss on crash
synchronous_commit = on

# Checkpoint configuration
checkpoint_timeout = 10min
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 256MB

#------------------------------------------------------------------------------
# QUERY PLANNER
#------------------------------------------------------------------------------

# Cost settings for SSD storage
# Lower random_page_cost because SSD random access is nearly as fast as sequential
random_page_cost = 1.1
seq_page_cost = 1.0

# Enable index-only scans
effective_io_concurrency = 200

# Statistics for better query planning
default_statistics_target = 100

#------------------------------------------------------------------------------
# AUTOVACUUM
#------------------------------------------------------------------------------

# Enable autovacuum (critical for performance!)
autovacuum = on

# Run autovacuum more frequently on busy tables
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# Allow autovacuum to use more resources
autovacuum_vacuum_cost_limit = 1000
autovacuum_max_workers = 2

#------------------------------------------------------------------------------
# LOGGING
#------------------------------------------------------------------------------

# Log slow queries for optimization
log_min_duration_statement = 1000  # Log queries taking > 1 second

# Log checkpoints for monitoring
log_checkpoints = on

# Log connections/disconnections
log_connections = off
log_disconnections = off

# Log lock waits
log_lock_waits = on

# Timezone
log_timezone = 'UTC'

#------------------------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
#------------------------------------------------------------------------------

# Timezone
timezone = 'UTC'

# Locale
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'

# Default text search configuration
default_text_search_config = 'pg_catalog.english'

#------------------------------------------------------------------------------
# PERFORMANCE TUNING FOR BOORU WORKLOAD
#------------------------------------------------------------------------------

# JIT compilation (can help with complex queries)
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

# Enable huge pages if available (requires OS configuration)
# huge_pages = try

# Enable data checksums (if enabled at initdb)
# data_checksums = on

# Statement timeout to prevent runaway queries (optional)
# statement_timeout = 60000  # 60 seconds
